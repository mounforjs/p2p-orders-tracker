<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 850px;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    .tabs {
      display: flex;
      background: #333;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      cursor: pointer;
      background: none;
      color: #bbb;
      font-weight: bold;
    }

    .tab-btn.active {
      background: #fff;
      color: #f3ba2f;
      border-bottom: 3px solid #f3ba2f;
    }

    /* Contenedor principal de cada pestaña */
    .content {
      padding: 15px;
      display: none;
      background: #fff;
      height: 550px;
      box-sizing: border-box;
    }

    .content.active {
      display: flex;
      flex-direction: column;
    }

    /* Flexbox para separar tabla de botones */

    /* Área de la tabla con scroll interno */
    .scroll-area {
      flex-grow: 1;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 15px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      white-space: nowrap;
    }

    th {
      background: #f8f9fa;
      color: #555;
      padding: 10px;
      text-align: left;
      position: sticky;
      top: 0;
      border-bottom: 2px solid #eee;
      z-index: 10;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }

    /* Contenedor de botones inferiores */
    .footer-actions {
      display: flex;
      gap: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
    }

    #clearDataBtn {
      flex: 2;
      padding: 10px;
      background: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #testDataBtn {
      flex: 1;
      padding: 10px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .no-data {
      text-align: center;
      color: #999;
      padding: 40px;
    }

    /* ... Tus estilos de colores anteriores (col-order, col-fiat, etc.) ... */
  </style>
</head>

<body>
  <div class="tabs">
    <button class="tab-btn active" data-target="config">CONFIGURACIÓN</button>
    <button class="tab-btn" data-target="data">ÓRDENES Y RECEPTORES</button>
  </div>

  <div id="config" class="content active">
    <div
      style="display: flex; justify-content: space-between; align-items: center; background: #fffbe6; padding: 15px; border-radius: 5px; border: 1px solid #ffe58f;">
      <span>Monitor Activo (Binance Fiat)</span>
      <input type="checkbox" id="activeToggle">
    </div>
  </div>

  <div id="data" class="content">
    <div class="scroll-area">
      <table id="mainTable">
        <thead>
          <tr>
            <th>Orden</th>
            <th>Monto Bs.</th>
            <th>Nombre Receptor</th>
            <th>Cédula (ID)</th>
            <th>Teléfono</th>
            <th>Banco</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="noDataMsg" class="no-data">Esperando capturas de Binance...</div>
    </div>

    <!-- BOTONES FUERA DEL SCROLL PARA QUE SIEMPRE SE VEAN -->
    <div class="footer-actions">
      <button id="clearDataBtn">Limpiar Historial</button>
      <button id="testDataBtn">Datos de Prueba</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
